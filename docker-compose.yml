services:
  backend:
    build: ./backend
    container_name: log-forensight-backend
    ports:
      - "8000:8000"
    volumes:
      - ./samples:/samples:ro
      - ./config:/config:ro
    environment:
      - RULES_FILE=/config/rules.yaml

  frontend:
    build: ./frontend
    container_name: log-forensight-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
